<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #242424; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px; /* Slightly narrower for a cleaner login look */
            border-radius: 40px;
            padding: 40px 50px 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .brand {
            font-size: 12px;
            font-weight: 500;
            color: #333;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
            color: #000;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.left-icon {
            position: absolute;
            left: 12px;
            color: #999;
        }

        .input-wrapper i.right-icon {
            position: absolute;
            right: 12px;
            color: #999;
            cursor: pointer;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 35px; /* Fixed padding for left icon */
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #333;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .btn {
            background-color: #fff;
            color: #000;
            border: 1px solid #ccc;
            border-radius: 25px;
            padding: 12px 60px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s ease;
            width: fit-content;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            width: 100%;
            color: #555;
            font-size: 10px;
            font-weight: 600;
            margin: 25px 0;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        .secondary-btn {
            padding: 10px 40px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <script>
                window.addEventListener("DOMContentLoaded", () => {
                    const flashes = {{ messages|tojson }};
                    flashes.forEach(([, message]) => window.alert(message));
                });
            </script>
        {% endif %}
    {% endwith %}

    <div class="card">
        
        <h2>Login to your account</h2>

        <form action="{{ url_for('login') }}" method="post">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope left-icon"></i>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock left-icon"></i>
                    <input type="password" name="password" placeholder="Enter your password" required>
                    <i class="fa-regular fa-eye-slash right-icon"></i>
                </div>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn">Login</button>

                <div class="divider">Don't have an account?</div>

                <a href="{{ url_for('register') }}" class="btn secondary-btn">Register</a>
            </div>
        </form>
    </div>

</body>
</html>
