<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Future | Login & Signup</title>
    <link rel="stylesheet" href="../../static/css/login.css">
</head>
<body>

<div class="auth-container">
    <a href="index.html" class="back-home">← Back to Homepage</a>

    <div id="login-form" class="fade-in">
        <h2>Welcome Back</h2>
        <p class="subtitle">Ready to continue your journey?</p>
        
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        
        <button class="btn">Sign In</button>

        <div class="divider"><span>Social Entry</span></div>
        
        <p class="toggle-link">New here? <a href="#" onclick="toggleForm()">Create Account</a></p>
    </div>

    <div id="signup-form" class="hidden fade-in">
        <h2>Start Something New</h2>
        <p class="subtitle">Join thousands of creators today.</p>
        
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Create Password" required>
        
        <button class="btn">Get Started</button>

        <div class="divider"><span>Quick Sign Up</span></div>
        
        <p class="toggle-link">Already a member? <a href="#" onclick="toggleForm()">Sign In</a></p>
    </div>
</div>

<script>
    function toggleForm() {
        const login = document.getElementById('login-form');
        const signup = document.getElementById('signup-form');
        
        login.classList.toggle('hidden');
        signup.classList.toggle('hidden');
    }
</script> 

</body>
</html>
