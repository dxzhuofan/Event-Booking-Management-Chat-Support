<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Directory | EventBook</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        .sidebar { width: 260px; background: #1e293b; color: white; display: flex; flex-direction: column; min-height: 100vh; flex-shrink: 0; }
        .sidebar-header { padding: 2.5rem 2rem; font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { padding: 0 1rem; }
        .nav-item { display: flex; align-items: center; padding: 14px 18px; color: #cbd5e1; text-decoration: none; border-radius: 12px; margin-bottom: 8px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 12px; width: 20px; }

        .container { flex-grow: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .customer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .customer-card { background: white; border-radius: 20px; padding: 1.8rem; border: 1px solid #e2e8f0; position: relative; transition: 0.3s; }
        .customer-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .profile-img { width: 64px; height: 64px; border-radius: 16px; margin-right: 15px; }
        .vip-badge { position: absolute; top: 15px; right: 15px; background: #fef3c7; color: #92400e; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
        
        .btn-outline { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; background: transparent; cursor: pointer; font-weight: 600; }
        .btn-outline:hover { background: var(--primary); color: white; border-color: var(--primary); }

        @media (max-width: 1024px) { .sidebar { width: 80px; } .sidebar span, .sidebar-header { display: none; } .nav-item { justify-content: center; } .nav-item i { margin: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">EventBook</div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a>
            <a href="activechats.html" class="nav-item"><i class="fas fa-comment-dots"></i> <span>Active Chats</span></a>
            <a href="booking.html" class="nav-item"><i class="fas fa-calendar-check"></i> <span>Bookings</span></a>
            <a href="customer.html" class="nav-item active"><i class="fas fa-users"></i> <span>Customers</span></a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i> <span>Settings</span></a>
        </nav>
    </aside>

    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h2>Customer Directory</h2>
            <input type="text" id="custSearch" placeholder="Search customers..." style="padding:10px; border-radius:10px; border:1px solid #ddd; width:300px;">
        </header>

        <div class="customer-grid" id="custGrid">
            <div class="customer-card">
                <span class="vip-badge">VIP</span>
                <div style="display:flex; align-items:center; margin-bottom:1.5rem;">
                    <img src="https://ui-avatars.com/api/?name=Sarah+Jenkins&background=ee7752&color=fff" class="profile-img">
                    <div><h3 style="margin:0;">Sarah Jenkins</h3><span>sarah.j@outlook.com</span></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-outline"><i class="fas fa-comment"></i> Message</button>
                    <button class="btn-outline"><i class="fas fa-history"></i> History</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('custSearch').onkeyup = function() {
            let term = this.value.toLowerCase();
            document.querySelectorAll('.customer-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
            });
        };
    </script>
</body>
</html>
