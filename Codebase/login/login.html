<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Future | Login & Signup</title>
    <style>
        /* Modern aesthetic with a moving background */
        body { 
            font-family: 'Poppins', 'Segoe UI', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; /* Changed to min-height for long forms */
            margin: 0; 
            padding: 20px; /* Padding for mobile safety */
            box-sizing: border-box;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Effect */
        .auth-container { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 3rem; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 { color: #1e293b; margin-bottom: 0.5rem; font-size: 1.8rem; letter-spacing: -0.5px; }
        p.subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; }

        /* Stylish Input Fields */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 2px solid #f1f5f9; 
            border-radius: 12px; 
            box-sizing: border-box; 
            outline: none;
            background: #f8fafc;
            font-size: 16px; /* Prevents iOS zoom-on-focus */
            transition: all 0.3s ease;
        }
        input:focus { 
            border-color: #2563eb; 
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Gradient Button */
        .btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(to right, #2563eb, #7c3aed); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem; 
            margin-top: 1.2rem; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .divider { margin: 1.5rem 0; display: flex; align-items: center; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
        .divider span { padding: 0 15px; }

        .toggle-link { margin-top: 1.5rem; font-size: 0.9rem; color: #64748b; }
        .toggle-link a { color: #2563eb; text-decoration: none; font-weight: 700; }
        
        /* Fixed Back Home Link for Mobile */
        .back-home { 
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #2563eb; 
            text-decoration: none; 
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-home:hover { color: #7c3aed; }

        .hidden { display: none; }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 480px) {
            .auth-container {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }
            h2 { font-size: 1.5rem; }
            body { overflow-y: auto; } /* Allow scrolling if screen is very short */
        }
    </style>
</head>
<body>

<div class="auth-container">
    <a href="index.html" class="back-home">← Back to Homepage</a>

    <div id="login-form" class="fade-in">
        <h2>Welcome Back</h2>
        <p class="subtitle">Ready to continue your journey?</p>
        
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        
        <button class="btn">Sign In</button>

        <div class="divider"><span>Social Entry</span></div>
        
        <p class="toggle-link">New here? <a href="#" onclick="toggleForm()">Create Account</a></p>
    </div>

    <div id="signup-form" class="hidden fade-in">
        <h2>Start Something New</h2>
        <p class="subtitle">Join thousands of creators today.</p>
        
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Create Password" required>
        
        <button class="btn">Get Started</button>

        <div class="divider"><span>Quick Sign Up</span></div>
        
        <p class="toggle-link">Already a member? <a href="#" onclick="toggleForm()">Sign In</a></p>
    </div>
</div>

<script>
    function toggleForm() {
        const login = document.getElementById('login-form');
        const signup = document.getElementById('signup-form');
        
        login.classList.toggle('hidden');
        signup.classList.toggle('hidden');
    }
</script> 

</body>
</html>
